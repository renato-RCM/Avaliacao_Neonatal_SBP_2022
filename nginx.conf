# =========================================================
# nginx config para SPA Vite (Avaliacao Neonatal SBP 2022)
# =========================================================
# Pontos chave:
#   1. SPA fallback: qualquer rota que nao seja arquivo
#      retorna /index.html para o React Router resolver.
#   2. Cache agressivo nos assets com hash (immutable).
#   3. Sem cache no index.html (deploy reflete imediatamente).
#   4. Compressao gzip habilitada para tudo que vale a pena.
# =========================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2
        font/ttf;

    # Cabecalhos de seguranca basicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Assets com hash (Vite gera /assets/index-XXXX.js etc.)
    # Cache longo + immutable porque o nome muda a cada build.
    location ^~ /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SVGs e imagens (favicon, etc.)
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # index.html nunca cacheia para refletir deploy imediato
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota desconhecida volta pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pagina de erro padrao volta para SPA tambem
    error_page 404 /index.html;
}
